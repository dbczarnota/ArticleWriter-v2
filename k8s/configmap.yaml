apiVersion: v1
kind: ConfigMap
metadata:
  name: articlewriter-config
  namespace: headlinesforge
data:
  # Serper.dev pricing: $1 per 1000 queries = $0.001 per query.
  # Update this value if Serper changes their pricing — no rebuild needed,
  # just apply this file and restart the backend pod.
  SERPER_COST_PER_QUERY_USD: "0.001"
  # Jina Reader paid tier: ~$0.02 per 1000 pages = $0.00002 per page.
  JINA_COST_PER_PAGE_USD: "0.00002"
  # Apify actor costs (USD per run) as JSON. Keys: "actor" or "actor:service".
  # "actor:service" wins over "actor". Add new actors here without rebuild.
  # instagram: $1.50/1k results + proxies ≈ $0.003/post
  # twitter tweet query: $0.05/query; replies search: $0.016/query
  APIFY_ACTOR_COSTS: '{"apify~instagram-scraper": 0.003, "apidojo~twitter-scraper-lite:x.tweet": 0.05, "apidojo~twitter-scraper-lite:x.replies": 0.016}'
