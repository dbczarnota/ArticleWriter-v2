name: build

on:
  workflow_dispatch:
    inputs:
      deployToRegion:
        description: 'Deploy to k8s'
        type: boolean
        default: true
        required: true
      targetRegion:
        description: 'Deploy to environment'
        required: true
        default: 'ragchatbot'
        type: choice
        options:
        - ragchatbot
        - rag-dev
        - rag-test
        - rag-clara

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4  

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3  

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
          registry: registry.digitalavenue.pl
          username: registry
          password: ${{ secrets.DOCKER_REG_PASS }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
            context: .
            push: true
            tags: "registry.digitalavenue.pl/dcz-article-writer:v${{github.run_number}}"
            cache-from: type=gha
            cache-to: type=gha,mode=max

  deployment:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions-hub/kubectl@master
        if: ${{ inputs.deployToRegion }}
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: set image deployment/dcz-article-writer dcz-article-writer=registry.digitalavenue.pl/dcz-article-writer:v${{github.run_number}} -n ${{ inputs.targetRegion }}
  